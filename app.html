<!DOCTYPE html>
<html>
<head>
  <title>SolarSense Platform</title>
</head>

<body>

<script>
if (localStorage.getItem("auth") !== "true") {
  alert("Acesso não autorizado");
  window.location.href = "index.html";
}
</script>

<h1>Bem-vindo à plataforma SolarSense 🚀</h1>
<p>Área interna da equipe</p>

<button onclick="logout()">Logout</button>

<script>
function logout() {
  localStorage.removeItem("auth");
  window.location.href = "index.html";
}
</script>

</body>
</html>
