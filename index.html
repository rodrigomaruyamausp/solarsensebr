<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Página Protegida</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .lock-icon { font-size: 48px; margin-bottom: 16px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 8px; }
  p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 28px; }
  input[type=password] {
    width: 100%;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    transition: border 0.2s;
  }
  input[type=password]:focus { border-color: #4f8ef7; }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #4f8ef7, #7c3aed);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.88; }
  .error {
    margin-top: 14px;
    color: #ff6b6b;
    font-size: 13px;
    display: none;
  }
  .spinner { display: none; margin-top: 14px; color: rgba(255,255,255,0.5); font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <div class="lock-icon">🔒</div>
  <h1>Página Protegida</h1>
  <p>Digite a senha para acessar o conteúdo</p>
  <input type="password" id="pwd" placeholder="Senha..." autofocus/>
  <button onclick="decrypt()">Desbloquear</button>
  <div class="error" id="err">❌ Senha incorreta. Tente novamente.</div>
  <div class="spinner" id="spin">Desencriptando...</div>
</div>

async function decrypt() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('spin').style.display = 'block';
  try {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: SALT, iterations: 100000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: IV }, key, CT);
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') decrypt(); });
