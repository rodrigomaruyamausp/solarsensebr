<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SolarSense</title>
<style>
  :root {
    --green: #2d9c6e;
    --green-light: #3dbf88;
    --green-dim: rgba(45,156,110,.12);
    --amber: #f0a323;
    --dark: #0d1117;
    --dark-2: #141b24;
    --dark-3: #1b2636;
    --border: rgba(255,255,255,.08);
    --text: #e8edf3;
    --muted: #7a8fa8;
    --card: rgba(255,255,255,.04);
    --radius: 14px;
    --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--dark);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: .4;
  }
  #gate {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: opacity .4s ease, visibility .4s ease;
  }
  #gate.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #gate::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: .4;
  }
  .gate-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(45,156,110,.14) 0%, transparent 70%);
    top: -100px; right: -50px;
    pointer-events: none;
  }
  .gate-glow-2 {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,163,35,.07) 0%, transparent 70%);
    bottom: 60px; left: 0;
    pointer-events: none;
  }
  .gate-card {
    position: relative;
    background: var(--dark-3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    animation: gateIn .5s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes gateIn {
    from { opacity: 0; transform: translateY(28px) scale(.97); }
    to   { opacity: 1; transform: none; }
  }
  .gate-logo {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 32px;
  }
  .gate-logo svg { color: var(--green); }
  .gate-lock {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--green-dim);
    border: 1px solid rgba(45,156,110,.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .gate-lock svg { color: var(--green-light); width: 24px; height: 24px; }
  .gate-card h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -.01em;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .gate-card p {
    font-size: .875rem;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.65;
  }
  .gate-input-wrap {
    position: relative;
    margin-bottom: 14px;
    text-align: left;
  }
  .gate-input-wrap label {
    display: block;
    font-size: .8rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .gate-input-row { position: relative; }
  #gate-password {
    width: 100%;
    padding: 12px 44px 12px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, background .2s, box-shadow .2s;
    letter-spacing: .05em;
  }
  #gate-password:focus {
    border-color: var(--green);
    background: rgba(45,156,110,.06);
    box-shadow: 0 0 0 3px rgba(45,156,110,.12);
  }
  #gate-password.error {
    border-color: #e05252;
    background: rgba(224,82,82,.06);
    box-shadow: 0 0 0 3px rgba(224,82,82,.1);
    animation: shake .35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  .toggle-vis {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    display: flex; align-items: center;
    transition: color .2s;
  }
  .toggle-vis:hover { color: var(--text); }
  .toggle-vis svg { width: 16px; height: 16px; display: block; }
  #gate-error {
    font-size: .8rem;
    color: #e07070;
    text-align: left;
    margin-bottom: 14px;
    min-height: 18px;
    display: flex; align-items: center; gap: 6px;
    opacity: 0;
    transition: opacity .2s;
  }
  #gate-error.show { opacity: 1; }
  #gate-error svg { width: 14px; height: 14px; flex-shrink: 0; }
  .gate-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: var(--green);
    color: #fff;
    font-family: var(--font-body);
    font-size: .95rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 0 28px rgba(45,156,110,.2);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .gate-btn:hover {
    background: var(--green-light);
    transform: translateY(-1px);
    box-shadow: 0 0 40px rgba(45,156,110,.3);
  }
  .gate-btn:active { transform: translateY(0); }
  .gate-btn svg { width: 16px; height: 16px; }
  .gate-attempts {
    font-size: .75rem;
    color: var(--muted);
    margin-top: 16px;
  }
  .gate-attempts span { color: #e07070; }
</style>
</head>
<body>

<div id="gate" role="dialog" aria-modal="true" aria-labelledby="gate-heading">
  <div class="gate-glow"></div>
  <div class="gate-glow-2"></div>
  <div class="gate-card">
    <div class="gate-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      SolarSense
    </div>
    <div class="gate-lock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <h1 id="gate-heading">Acesso restrito</h1>
    <p>Este conteúdo é privado. Insira a senha para continuar.</p>
    <div class="gate-input-wrap">
      <label for="gate-password">Senha</label>
      <div class="gate-input-row">
        <input type="password" id="gate-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') submitGate()"/>
        <button class="toggle-vis" onclick="toggleVisibility()" aria-label="Mostrar/ocultar senha" tabindex="-1">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div id="gate-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="gate-error-msg">Senha incorreta. Tente novamente.</span>
    </div>
    <button class="gate-btn" onclick="submitGate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/></svg>
      Entrar
    </button>
    <p class="gate-attempts" id="gate-attempts-msg"></p>
  </div>
</div>

const MAX_ATTEMPTS = 5;
let attempts = 0;
let locked = false;
let pwVisible = false;

async function submitGate() {
  if (locked) return;
  const input = document.getElementById('gate-password');
  const errorEl = document.getElementById('gate-error');
  const attemptsEl = document.getElementById('gate-attempts-msg');
  const entered = input.value;

  if (!entered) {
    showGateError('Por favor, insira a senha.');
    input.focus();
    return;
  }

  try {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(entered), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: SALT, iterations: 100000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: IV }, key, CT);
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch {
    attempts++;
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    input.value = '';
    const remaining = MAX_ATTEMPTS - attempts;
    if (attempts >= MAX_ATTEMPTS) {
      locked = true;
      input.disabled = true;
      document.querySelector('.gate-btn').disabled = true;
      showGateError('Muitas tentativas. Aguarde 30 segundos.');
      attemptsEl.innerHTML = '';
      setTimeout(() => {
        locked = false; attempts = 0;
        input.disabled = false;
        document.querySelector('.gate-btn').disabled = false;
        errorEl.classList.remove('show');
        attemptsEl.innerHTML = '';
        input.focus();
      }, 30000);
    } else {
      showGateError('Senha incorreta. Tente novamente.');
      if (remaining <= 2) {
        attemptsEl.innerHTML = `<span>${remaining}</span> tentativa${remaining === 1 ? '' : 's'} restante${remaining === 1 ? '' : 's'}`;
      }
      input.focus();
    }
  }
}

function showGateError(msg) {
  const el = document.getElementById('gate-error');
  document.getElementById('gate-error-msg').textContent = msg;
  el.classList.add('show');
}

function toggleVisibility() {
  pwVisible = !pwVisible;
  const input = document.getElementById('gate-password');
  const icon = document.getElementById('eye-icon');
  input.type = pwVisible ? 'text' : 'password';
  icon.innerHTML = pwVisible
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gate-password').focus();
});
</script>
