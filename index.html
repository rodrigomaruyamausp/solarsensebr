  <title>SolarSense — Acesso restrito</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#2d9c6e;--green-light:#3dbf88;--green-dim:rgba(45,156,110,.12);--dark:#0d1117;--dark-3:#1b2636;--border:rgba(255,255,255,.08);--text:#e8edf3;--muted:#7a8fa8;--font:'Segoe UI',system-ui,-apple-system,sans-serif}
    body{font-family:var(--font);background:var(--dark);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
    .card{position:relative;background:var(--dark-3);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:400px;width:100%;text-align:center;animation:up .5s cubic-bezier(.16,1,.3,1) both}
    @keyframes up{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
    .logo{display:inline-flex;align-items:center;gap:9px;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:32px}
    .logo svg{color:var(--green)}
    .lock{width:56px;height:56px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(45,156,110,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
    .lock svg{color:#3dbf88;width:24px;height:24px}
    h1{font-size:1.3rem;font-weight:700;margin-bottom:8px;letter-spacing:-.01em}
    p{font-size:.875rem;color:var(--muted);margin-bottom:28px;line-height:1.65}
    .field{position:relative;text-align:left;margin-bottom:14px}
    label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    input{width:100%;padding:12px 44px 12px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.95rem;outline:none;transition:border-color .2s,background .2s,box-shadow .2s;letter-spacing:.05em}
    input:focus{border-color:var(--green);background:rgba(45,156,110,.06);box-shadow:0 0 0 3px rgba(45,156,110,.12)}
    input.err{border-color:#e05252;background:rgba(224,82,82,.06);box-shadow:0 0 0 3px rgba(224,82,82,.1);animation:shake .35s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;transition:color .2s}
    .eye:hover{color:var(--text)}
    .eye svg{width:16px;height:16px;display:block}
    .err-msg{font-size:.8rem;color:#e07070;text-align:left;margin-bottom:14px;min-height:18px;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .2s}
    .err-msg.show{opacity:1}
    .err-msg svg{width:14px;height:14px;flex-shrink:0}
    .btn{width:100%;padding:13px;border-radius:10px;background:var(--green);color:#fff;font-family:var(--font);font-size:.95rem;font-weight:600;border:none;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 0 28px rgba(45,156,110,.2);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:hover{background:var(--green-light);transform:translateY(-1px);box-shadow:0 0 40px rgba(45,156,110,.3)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn svg{width:16px;height:16px}
    .hint{font-size:.75rem;color:var(--muted);margin-top:16px;min-height:18px}
    .hint span{color:#e07070}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    SolarSense
  </div>
  <div class="lock">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  <h1>Acesso restrito</h1>
  <p>Este conteúdo é privado. Insira a senha para descriptografar e acessar a página.</p>
  <div class="field">
    <label for="pw">Senha</label>
    <div style="position:relative">
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
      <button class="eye" onclick="toggleVis()" tabindex="-1" aria-label="Mostrar senha">
        <svg id="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div class="err-msg" id="err">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="err-msg">Senha incorreta.</span>
  </div>
  <button class="btn" id="btn" onclick="unlock()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/></svg>
    Entrar
  </button>
  <p class="hint" id="hint"></p>
</div>

const MAX=5;
let attempts=0,locked=false,pwVis=false;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
window.addEventListener('DOMContentLoaded',()=>document.getElementById('pw').focus());
function toggleVis(){
  pwVis=!pwVis;
  const i=document.getElementById('pw');
  i.type=pwVis?'text':'password';
  document.getElementById('eye').innerHTML=pwVis
    ?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
async function unlock(){
  if(locked)return;
  const pw=document.getElementById('pw').value;
  if(!pw){showErr('Por favor, insira a senha.');return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> Verificando…';
  try{
    const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
    const salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']
    );
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){
    attempts++;
    const rem=MAX-attempts;
    const pwEl=document.getElementById('pw');
    pwEl.classList.add('err');
    setTimeout(()=>pwEl.classList.remove('err'),400);
    pwEl.value='';
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/></svg> Entrar';
    if(attempts>=MAX){
      locked=true;btn.disabled=true;
      showErr('Muitas tentativas. Aguarde 30 segundos.');
      setTimeout(()=>{locked=false;attempts=0;btn.disabled=false;document.getElementById('err').classList.remove('show');document.getElementById('hint').innerHTML='';pwEl.focus();},30000);
    }else{
      showErr('Senha incorreta. Tente novamente.');
      if(rem<=2)document.getElementById('hint').innerHTML='<span>'+rem+'</span> tentativa'+(rem===1?'':'s')+' restante'+(rem===1?'':'s');
      pwEl.focus();
    }
  }
}
function showErr(msg){document.getElementById('err-msg').textContent=msg;document.getElementById('err').classList.add('show');}
