<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolarSense — Monitoramento inteligente para painéis solares</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d9c6e;
      --green-light: #3dbf88;
      --green-dim: rgba(45,156,110,.12);
      --amber: #f0a323;
      --dark: #0d1117;
      --dark-2: #141b24;
      --dark-3: #1b2636;
      --border: rgba(255,255,255,.08);
      --text: #e8edf3;
      --muted: #7a8fa8;
      --card: rgba(255,255,255,.04);
      --radius: 14px;
      --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .4;
    }

    /* ── PASSWORD GATE ── */
    #gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      transition: opacity .4s ease, visibility .4s ease;
    }
    #gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #gate::before {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: .4;
    }
    .gate-glow {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(45,156,110,.14) 0%, transparent 70%);
      top: -100px; right: -50px; pointer-events: none;
    }
    .gate-glow-2 {
      position: absolute; width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(240,163,35,.07) 0%, transparent 70%);
      bottom: 60px; left: 0; pointer-events: none;
    }
    .gate-card {
      position: relative;
      background: var(--dark-3); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px 40px; max-width: 400px; width: 100%; text-align: center;
      animation: gateIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes gateIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .gate-logo {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 32px;
    }
    .gate-logo svg { color: var(--green); }
    .gate-lock {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--green-dim); border: 1px solid rgba(45,156,110,.25);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    }
    .gate-lock svg { color: var(--green-light); width: 24px; height: 24px; }
    .gate-card h1 {
      font-size: 1.35rem; font-weight: 700; letter-spacing: -.01em;
      color: var(--text); margin-bottom: 8px; line-height: 1.2;
    }
    .gate-card p { font-size: .875rem; color: var(--muted); margin-bottom: 28px; line-height: 1.65; }
    .gate-input-wrap { position: relative; margin-bottom: 14px; text-align: left; }
    .gate-input-wrap label {
      display: block; font-size: .8rem; font-weight: 500; color: var(--muted);
      margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase;
    }
    .gate-input-row { position: relative; }
    #gate-password {
      width: 100%; padding: 12px 44px 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-body); font-size: .95rem;
      outline: none; transition: border-color .2s, background .2s, box-shadow .2s;
      letter-spacing: .05em;
    }
    #gate-password:focus {
      border-color: var(--green); background: rgba(45,156,110,.06);
      box-shadow: 0 0 0 3px rgba(45,156,110,.12);
    }
    #gate-password.error {
      border-color: #e05252; background: rgba(224,82,82,.06);
      box-shadow: 0 0 0 3px rgba(224,82,82,.1); animation: shake .35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
    .toggle-vis {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; display: flex; align-items: center; transition: color .2s;
    }
    .toggle-vis:hover { color: var(--text); }
    .toggle-vis svg { width: 16px; height: 16px; display: block; }
    #gate-error {
      font-size: .8rem; color: #e07070; text-align: left; margin-bottom: 14px;
      min-height: 18px; display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity .2s;
    }
    #gate-error.show { opacity: 1; }
    #gate-error svg { width: 14px; height: 14px; flex-shrink: 0; }
    .gate-btn {
      width: 100%; padding: 13px; border-radius: 10px;
      background: var(--green); color: #fff; font-family: var(--font-body);
      font-size: .95rem; font-weight: 600; border: none; cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 28px rgba(45,156,110,.2);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .gate-btn:hover { background: var(--green-light); transform: translateY(-1px); box-shadow: 0 0 40px rgba(45,156,110,.3); }
    .gate-btn:active { transform: translateY(0); }
    .gate-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .gate-btn svg { width: 16px; height: 16px; }
    .gate-attempts { font-size: .75rem; color: var(--muted); margin-top: 16px; }
    .gate-attempts span { color: #e07070; }
    .aes-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .7rem; color: var(--muted); margin-top: 18px;
      border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px;
    }
    .aes-badge svg { width: 12px; height: 12px; color: var(--green); }

    /* ── PAGE CONTENT ── */
    #page-content { display: none; }
    #page-content.visible { display: block; }

    /* ── UTILITY ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px; background: rgba(13,17,23,.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); display: flex; align-items: center;
    }
    nav .container { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .nav-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.1rem; color: var(--text); text-decoration: none; }
    .nav-logo svg { color: var(--green); }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-size: .875rem; color: var(--muted); text-decoration: none; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .btn-ghost { font-family: var(--font-body); font-size: .875rem; font-weight: 500; color: var(--muted); background: none; border: none; cursor: pointer; padding: 8px 14px; border-radius: 8px; transition: color .2s, background .2s; }
    .btn-ghost:hover { color: var(--text); background: var(--card); }
    .btn-primary { font-family: var(--font-body); font-size: .875rem; font-weight: 600; color: #fff; background: var(--green); border: none; cursor: pointer; padding: 9px 18px; border-radius: 8px; transition: background .2s, transform .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); }
    .btn-outline { font-family: var(--font-body); font-size: .875rem; font-weight: 500; color: var(--text); background: transparent; border: 1px solid var(--border); cursor: pointer; padding: 9px 18px; border-radius: 8px; transition: border-color .2s, background .2s, transform .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-outline:hover { border-color: rgba(255,255,255,.2); background: var(--card); transform: translateY(-1px); }
    .hamburger { display: none; background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }
    .mobile-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: var(--dark-2); border-bottom: 1px solid var(--border); padding: 16px 24px; z-index: 99; }
    .mobile-menu.open { display: block; }
    .mobile-menu a, .mobile-menu button { display: block; padding: 12px 0; color: var(--muted); text-decoration: none; font-size: .9rem; border-bottom: 1px solid var(--border); background: none; border-left: none; border-right: none; border-top: none; cursor: pointer; width: 100%; text-align: left; font-family: var(--font-body); }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover, .mobile-menu button:hover { color: var(--text); }
    .mobile-btn-primary { margin-top: 12px; width: 100%; text-align: center; padding: 12px; border-radius: 8px; background: var(--green); color: #fff; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-body); font-size: .9rem; }

    /* ── HERO ── */
    #hero { position: relative; min-height: 100vh; display: flex; align-items: center; overflow: hidden; padding-top: 64px; }
    .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0d1117 0%, #0f2030 50%, #0d1117 100%); }
    .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(45,156,110,.18) 0%, transparent 70%); top: -100px; right: -100px; pointer-events: none; }
    .hero-glow-2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(240,163,35,.08) 0%, transparent 70%); bottom: 0; left: 200px; pointer-events: none; }
    .hero-content { position: relative; z-index: 1; max-width: 720px; padding: 80px 0 60px; }
    .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--green-dim); border: 1px solid rgba(45,156,110,.3); color: #6eddb3; font-size: .8rem; font-weight: 500; padding: 6px 14px; border-radius: 99px; margin-bottom: 28px; animation: fadeUp .5s ease both; }
    .badge svg { width: 14px; height: 14px; }
    h1 { font-size: clamp(2.4rem, 5vw, 3.8rem); font-weight: 800; line-height: 1.1; letter-spacing: -.02em; color: var(--text); margin-bottom: 24px; animation: fadeUp .5s .1s ease both; }
    h1 .accent { background: linear-gradient(90deg, var(--green) 0%, #5dd4a0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-sub { font-size: 1.15rem; color: var(--muted); max-width: 560px; margin-bottom: 40px; line-height: 1.7; animation: fadeUp .5s .2s ease both; }
    .hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 56px; animation: fadeUp .5s .3s ease both; }
    .btn-hero { font-family: var(--font-body); font-size: 1rem; font-weight: 600; color: #fff; background: var(--green); border: none; cursor: pointer; padding: 14px 28px; border-radius: 10px; transition: background .2s, transform .15s, box-shadow .2s; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 0 32px rgba(45,156,110,.25); }
    .btn-hero:hover { background: var(--green-light); transform: translateY(-2px); box-shadow: 0 0 48px rgba(45,156,110,.35); }
    .btn-hero-outline { font-family: var(--font-body); font-size: 1rem; font-weight: 500; color: var(--text); background: transparent; border: 1px solid var(--border); cursor: pointer; padding: 14px 28px; border-radius: 10px; transition: border-color .2s, background .2s, transform .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-hero-outline:hover { border-color: rgba(255,255,255,.25); background: var(--card); transform: translateY(-2px); }
    .hero-stats { display: flex; gap: 40px; animation: fadeUp .5s .4s ease both; }
    .hero-stat .value { font-size: 1.75rem; font-weight: 700; color: var(--text); }
    .hero-stat .label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

    /* ── SECTION SHARED ── */
    section { position: relative; }
    .section-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--green); margin-bottom: 12px; }
    h2 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 700; line-height: 1.2; letter-spacing: -.01em; color: var(--text); margin-bottom: 16px; }
    .section-sub { font-size: 1.05rem; color: var(--muted); max-width: 520px; line-height: 1.7; }
    .section-header { text-align: center; margin-bottom: 64px; }
    .section-header .section-sub { margin: 0 auto; }

    /* ── PROBLEM ── */
    #problema { padding: 100px 0; background: var(--dark); }
    .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; transition: border-color .25s, transform .25s, background .25s; }
    .card:hover { border-color: rgba(45,156,110,.3); transform: translateY(-4px); background: rgba(45,156,110,.04); }
    .card-icon { width: 48px; height: 48px; border-radius: 10px; background: rgba(255,255,255,.05); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; transition: background .25s; }
    .card:hover .card-icon { background: var(--green-dim); }
    .card-icon svg { width: 22px; height: 22px; color: var(--muted); transition: color .25s; }
    .card:hover .card-icon svg { color: var(--green-light); }
    .card h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .card p { font-size: .9rem; color: var(--muted); line-height: 1.7; }

    /* ── SOLUTION ── */
    #solucao { padding: 100px 0; background: var(--dark-2); }
    .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 860px; margin: 0 auto; }
    .feature-card { display: flex; gap: 18px; padding: 24px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color .25s, transform .2s; }
    .feature-card:hover { border-color: rgba(45,156,110,.25); transform: translateY(-2px); }
    .feature-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--green-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .feature-icon svg { width: 20px; height: 20px; color: var(--green-light); }
    .feature-card h3 { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .feature-card p { font-size: .875rem; color: var(--muted); line-height: 1.65; }

    /* ── LEAD FORM ── */
    #interesse { padding: 100px 0; background: var(--dark); }
    .form-wrap { max-width: 480px; margin: 0 auto; text-align: center; }
    .form-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--green-dim); border: 1px solid rgba(45,156,110,.25); color: var(--green-light); font-size: .8rem; font-weight: 500; padding: 6px 14px; border-radius: 99px; margin-bottom: 24px; }
    .form-badge svg { width: 14px; height: 14px; }
    .form-wrap h2 { margin-bottom: 12px; }
    .form-wrap .section-sub { margin-bottom: 8px; }
    .form-note { font-size: .8rem; color: var(--muted); margin-bottom: 32px; }
    form { text-align: left; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .875rem; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    input[type="text"], input[type="email"] { width: 100%; padding: 11px 14px; border-radius: 9px; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text); font-family: var(--font-body); font-size: .9rem; transition: border-color .2s, background .2s; outline: none; }
    input[type="text"]:focus, input[type="email"]:focus { border-color: var(--green); background: rgba(45,156,110,.06); }
    input::placeholder { color: rgba(122,143,168,.6); }
    .btn-submit { width: 100%; padding: 13px; border-radius: 9px; background: var(--green); color: #fff; font-family: var(--font-body); font-size: .95rem; font-weight: 600; border: none; cursor: pointer; margin-top: 4px; transition: background .2s, transform .15s, box-shadow .2s; box-shadow: 0 0 28px rgba(45,156,110,.2); }
    .btn-submit:hover { background: var(--green-light); transform: translateY(-1px); box-shadow: 0 0 40px rgba(45,156,110,.3); }
    .form-disclaimer { font-size: .75rem; color: var(--muted); text-align: center; margin-top: 12px; }
    .success-box { display: none; text-align: center; padding: 40px 32px; background: var(--card); border: 1px solid rgba(45,156,110,.25); border-radius: var(--radius); }
    .success-box.show { display: block; }
    .success-box svg { width: 52px; height: 52px; color: var(--green-light); margin-bottom: 16px; }
    .success-box h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; }
    .success-box p { font-size: .9rem; color: var(--muted); }
    .success-box strong { color: var(--text); }

    /* ── PARTNERS ── */
    #parceiros { padding: 100px 0; background: var(--dark-2); }
    .partners-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; max-width: 900px; margin: 0 auto; }
    .partners-left .section-sub { margin-bottom: 32px; }
    .partner-card { display: flex; gap: 16px; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; transition: border-color .2s, transform .2s; }
    .partner-card:last-child { margin-bottom: 0; }
    .partner-card:hover { border-color: rgba(45,156,110,.2); transform: translateX(4px); }
    .partner-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--green-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .partner-icon svg { width: 18px; height: 18px; color: var(--green-light); }
    .partner-card h3 { font-size: .95rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .partner-card p { font-size: .82rem; color: var(--muted); line-height: 1.55; }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--border); background: var(--dark); padding: 48px 0 32px; }
    .footer-inner { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 32px; }
    .footer-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1rem; color: var(--text); text-decoration: none; }
    .footer-logo svg { color: var(--green); }
    .footer-copy { font-size: .8rem; color: var(--muted); text-align: center; max-width: 380px; line-height: 1.6; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: .8rem; color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer-links a:hover { color: var(--text); }
    .footer-bottom { border-top: 1px solid var(--border); padding-top: 20px; text-align: center; font-size: .75rem; color: var(--muted); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--dark-3); border: 1px solid var(--border); border-radius: 18px; padding: 40px 36px; max-width: 420px; width: 100%; position: relative; animation: modalIn .25s ease; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; transition: color .2s, background .2s; }
    .modal-close:hover { color: var(--text); background: var(--card); }
    .modal-close svg { width: 18px; height: 18px; display: block; }
    .modal-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--green-dim); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .modal-icon svg { width: 24px; height: 24px; color: var(--green-light); }
    .modal h3 { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 10px; }
    .modal-desc { font-size: .9rem; color: var(--muted); text-align: center; line-height: 1.65; margin-bottom: 24px; }
    .modal input[type="email"] { margin-bottom: 12px; }
    .modal-success { display: none; text-align: center; padding: 8px 0; }
    .modal-success.show { display: block; }
    .modal-success svg { width: 48px; height: 48px; color: var(--green-light); margin-bottom: 12px; }
    .modal-success h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .modal-success p { font-size: .875rem; color: var(--muted); }
    .modal-success strong { color: var(--text); }

    /* ── MOBILE PLATFORM ── */
    #plataforma_mobile { padding: 100px 0; background: var(--dark); }
    .mobile-compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
    .mobile-compare-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .mobile-compare-label { display: inline-flex; align-items: center; gap: 8px; font-size: .8rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 6px 16px; border-radius: 99px; }
    .mobile-label-bad { background: rgba(232,76,76,.12); border: 1px solid rgba(232,76,76,.25); color: #e84c4c; }
    .mobile-label-good { background: rgba(45,156,110,.12); border: 1px solid rgba(45,156,110,.25); color: var(--green-light); }
    .mobile-frame-wrap { width: 100%; max-width: 380px; height: 640px; border-radius: 28px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 24px 64px rgba(0,0,0,.45); position: relative; }
    .mobile-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity .55s ease, transform .55s ease; }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: .1s; }
    .reveal-delay-2 { transition-delay: .2s; }
    .reveal-delay-3 { transition-delay: .3s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-links, .nav-actions { display: none; }
      .hamburger { display: block; }
      .cards-grid { grid-template-columns: 1fr; }
      .features-grid { grid-template-columns: 1fr; }
      .partners-grid { grid-template-columns: 1fr; }
      .hero-stats { gap: 24px; }
      .hero-stat .value { font-size: 1.4rem; }
      .footer-inner { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
      .gate-card { padding: 36px 28px; }
      .mobile-compare-grid { grid-template-columns: 1fr; gap: 40px; }
      .mobile-frame-wrap { max-width: 100%; height: 580px; }
    }
    @media (max-width: 480px) {
      .hero-cta { flex-direction: column; }
      .btn-hero, .btn-hero-outline { width: 100%; justify-content: center; }
    }
  </style>
</head>

  const MAX_ATTEMPTS = 5;
  let attempts = 0;
  let locked = false;
  let pwVisible = false;

  /* Derive AES key using PBKDF2 via Web Crypto API */
  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-CBC', length: 256 },
      false,
      ['decrypt']
    );
  }

  /* Hex string -> Uint8Array */
  function hexToBytes(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    return bytes;
  }

  /* Base64 -> ArrayBuffer */
  function b64toBuffer(b64) {
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }

  async function submitGate() {
    if (locked) return;

    const input = document.getElementById('gate-password');
    const btn = document.getElementById('gate-submit-btn');
    const errorEl = document.getElementById('gate-error');
    const password = input.value;

    if (!password) { showGateError('Por favor, insira a senha.'); input.focus(); return; }

    btn.disabled = true;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Verificando…';

    try {
      const key = await deriveKey(password, ENCRYPTED.salt);
      const iv = hexToBytes(ENCRYPTED.iv);
      const ciphertext = b64toBuffer(ENCRYPTED.ct);

      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-CBC', iv },
        key,
        ciphertext
      );

      const html = new TextDecoder().decode(decrypted);
      unlockPage(html);

    } catch (err) {
      /* Decryption failed = wrong password */
      attempts++;
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 400);
      input.value = '';

      const remaining = MAX_ATTEMPTS - attempts;

      if (attempts >= MAX_ATTEMPTS) {
        locked = true;
        input.disabled = true;
        btn.disabled = true;
        showGateError('Muitas tentativas. Aguarde 30 segundos.');
        document.getElementById('gate-attempts-msg').innerHTML = '';
        setTimeout(() => {
          locked = false; attempts = 0;
          input.disabled = false; btn.disabled = false;
          errorEl.classList.remove('show');
          document.getElementById('gate-attempts-msg').innerHTML = '';
          resetBtn(); input.focus();
        }, 30000);
      } else {
        showGateError('Senha incorreta. Tente novamente.');
        if (remaining <= 2) {
          document.getElementById('gate-attempts-msg').innerHTML =
            '<span>' + remaining + '</span> tentativa' + (remaining === 1 ? '' : 's') + ' restante' + (remaining === 1 ? '' : 's');
        }
        resetBtn(); input.focus();
      }
    }
  }

  function resetBtn() {
    const btn = document.getElementById('gate-submit-btn');
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/></svg> Entrar';
  }

  function showGateError(msg) {
    const el = document.getElementById('gate-error');
    document.getElementById('gate-error-msg').textContent = msg;
    el.classList.add('show');
  }

  function unlockPage(html) {
    const gate = document.getElementById('gate');
    const content = document.getElementById('page-content');
    content.innerHTML = html;
    content.classList.add('visible');
    gate.classList.add('hidden');
    document.body.style.overflow = '';
    setTimeout(() => { gate.style.display = 'none'; initPage(); }, 420);
  }

  function toggleVisibility() {
    pwVisible = !pwVisible;
    const input = document.getElementById('gate-password');
    const icon = document.getElementById('eye-icon');
    input.type = pwVisible ? 'text' : 'password';
    icon.innerHTML = pwVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  /* ══ PAGE INIT ══ */
  function initPage() {
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    const navEl = document.querySelector('nav');
    if (navEl) window.addEventListener('scroll', () => {
      navEl.style.boxShadow = window.scrollY > 20 ? '0 4px 32px rgba(0,0,0,.4)' : 'none';
    });
  }

  /* ══ MOBILE MENU ══ */
  let menuOpen = false;
  function toggleMenu() { menuOpen = !menuOpen; document.getElementById('mobile-menu').classList.toggle('open', menuOpen); }
  function closeMenu() { menuOpen = false; document.getElementById('mobile-menu').classList.remove('open'); }

  /* ══ MODAL ══ */
  const modalData = {
    demo: { title: 'Solicitar demonstração', desc: 'Nosso produto ainda está em fase de desenvolvimento. Deixe seu e-mail e entraremos em contato assim que a demonstração estiver disponível.' },
    signin: { title: 'Plataforma em construção', desc: 'A área do cliente ainda não está disponível. Cadastre seu e-mail para ter acesso prioritário quando lançarmos.' }
  };
  function openModal(type) {
    const data = modalData[type] || modalData.demo;
    document.getElementById('modal-title').textContent = data.title;
    document.getElementById('modal-desc').textContent = data.desc;
    document.getElementById('modal-email').value = '';
    document.getElementById('modal-form-content').style.display = '';
    document.getElementById('modal-success').classList.remove('show');
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('modal-email').focus(), 50);
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }
  function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }
  function submitModal() {
    const email = document.getElementById('modal-email').value.trim();
    if (!email || !email.includes('@')) { document.getElementById('modal-email').focus(); return; }
    document.getElementById('modal-confirmed-email').textContent = email;
    document.getElementById('modal-form-content').style.display = 'none';
    document.getElementById('modal-success').classList.add('show');
  }
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  /* ══ LEAD FORM ══ */
  function submitLead(e) {
    e.preventDefault();
    const name = document.getElementById('lead-name').value.trim();
    const email = document.getElementById('lead-email').value.trim();
    if (!name || !email) return;
    document.getElementById('lead-form').style.display = 'none';
    document.getElementById('lead-success-msg').innerHTML = 'Obrigado, ' + name + '! Entraremos em contato pelo e-mail <strong style="color:var(--text)">' + email + '</strong> assim que tivermos novidades.';
    document.getElementById('lead-success').classList.add('show');
  }

  /* Auto-focus */
  window.addEventListener('DOMContentLoaded', () => { document.getElementById('gate-password').focus(); });
</script>
</body>
</html>
