<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarSense</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
  padding: 60px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #141b24;
  padding: 30px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #2d9c6e;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #3dbf88;
}
</style>
</head>

<body>

<div class="container">
  <h1>SolarSense</h1>
  <p>Acesso restrito à equipe</p>

  <input type="password" id="password" placeholder="Digite a senha">

  <button onclick="login()">Entrar</button>

  <p id="error" style="color:red; display:none;">Senha incorreta</p>
</div>

<script>

// 🔑 DEFINE YOUR TEAM PASSWORD HERE
const SYSTEM_PASSWORD = "solarsense2026";

// LOGIN FUNCTION
function login() {
  const input = document.getElementById("password").value;

  if (input === SYSTEM_PASSWORD) {
    localStorage.setItem("auth", "true");
    window.location.href = "app.html";
  } else {
    document.getElementById("error").style.display = "block";
  }
}

// ENTER KEY SUPPORT
document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") login();
});

</script>

</body>
</html>
