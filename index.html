<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarSense</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
  padding: 40px;
}

button {
  padding: 12px 20px;
  background: #2d9c6e;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
}
</style>
</head>

<body>

<h1>SolarSense</h1>
<p>Monitoramento inteligente para sistemas fotovoltaicos</p>

<button onclick="openModal()">Acessar plataforma</button>

<!-- MODAL -->
<div id="modal" style="display:none; margin-top:30px;">

  <h2>Solicitar acesso</h2>

  <input type="text" id="name" placeholder="Seu nome">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="company" placeholder="Empresa">

  <button onclick="requestAccess()">Solicitar acesso</button>
  <button onclick="login()">Entrar</button>

</div>

<script>

function openModal() {
  document.getElementById("modal").style.display = "block";
}

// REQUEST ACCESS
function requestAccess() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const company = document.getElementById("company").value;

  if (!name || !email || !company) {
    alert("Preencha todos os campos");
    return;
  }

  let requests = JSON.parse(localStorage.getItem("requests") || "[]");

  requests.push({
    name,
    email,
    company,
    status: "pending"
  });

  localStorage.setItem("requests", JSON.stringify(requests));

  alert("Solicitação enviada!");
}

// LOGIN
function login() {

  const email = document.getElementById("email").value;

  let approved = JSON.parse(localStorage.getItem("approved") || "[]");

  if (approved.includes(email)) {
    localStorage.setItem("user", email);
    window.location.href = "app.html";
  } else {
    alert("Acesso não aprovado ainda.");
  }
}

</script>

</body>
</html>
