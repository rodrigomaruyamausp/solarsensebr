<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolarSense — Acesso Protegido</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d9c6e; --green-light: #3dbf88;
      --green-dim: rgba(45,156,110,.12);
      --dark: #0d1117; --dark-3: #1b2636;
      --border: rgba(255,255,255,.08);
      --text: #e8edf3; --muted: #7a8fa8;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .4;
    }
    .glow {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(45,156,110,.14) 0%, transparent 70%);
      top: -100px; right: -50px; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--dark-3); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px;
      max-width: 400px; width: 100%; text-align: center;
      animation: gateIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes gateIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .logo {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 1.25rem; font-weight: 700; color: var(--text);
      margin-bottom: 32px;
    }
    .logo svg { color: var(--green); }
    .lock-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--green-dim); border: 1px solid rgba(45,156,110,.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .lock-icon svg { color: var(--green-light); width: 24px; height: 24px; }
    h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 8px; }
    p.sub { font-size: .875rem; color: var(--muted); margin-bottom: 28px; line-height: 1.65; }
    label {
      display: block; font-size: .8rem; font-weight: 500;
      color: var(--muted); margin-bottom: 6px;
      letter-spacing: .04em; text-transform: uppercase; text-align: left;
    }
    .input-row { position: relative; margin-bottom: 14px; }
    input[type=password], input[type=text] {
      width: 100%; padding: 12px 44px 12px 14px;
      border-radius: 10px; background: rgba(255,255,255,.05);
      border: 1px solid var(--border); color: var(--text);
      font-size: .95rem; outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      font-family: 'Segoe UI', system-ui, sans-serif;
      letter-spacing: .05em;
    }
    input:focus {
      border-color: var(--green); background: rgba(45,156,110,.06);
      box-shadow: 0 0 0 3px rgba(45,156,110,.12);
    }
    input.err {
      border-color: #e05252; background: rgba(224,82,82,.06);
      box-shadow: 0 0 0 3px rgba(224,82,82,.1);
      animation: shake .35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; display: flex; align-items: center; transition: color .2s;
    }
    .eye:hover { color: var(--text); }
    .eye svg { width: 16px; height: 16px; display: block; }
    #err-msg {
      font-size: .8rem; color: #e07070; text-align: left;
      margin-bottom: 14px; min-height: 18px;
      opacity: 0; transition: opacity .2s;
    }
    #err-msg.show { opacity: 1; }
    button.submit {
      width: 100%; padding: 13px; border-radius: 10px;
      background: var(--green); color: #fff;
      font-size: .95rem; font-weight: 600; border: none; cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 28px rgba(45,156,110,.2);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button.submit:hover { background: var(--green-light); transform: translateY(-1px); }
    button.submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    #spinner { display:none; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    SolarSense
  </div>
  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>Acesso Restrito</h1>
  <p class="sub">Digite a senha para acessar o conteúdo da plataforma SolarSense.</p>

  <label for="pw">Senha</label>
  <div class="input-row">
    <input type="password" id="pw" placeholder="••••••••••••" autocomplete="current-password" />
    <button class="eye" onclick="toggleEye()" type="button" aria-label="Mostrar senha">
      <svg id="eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
  <div id="err-msg"></div>
  <button class="submit" id="btn" onclick="unlock()">
    <div id="spinner"></div>
    <span id="btn-text">Entrar</span>
  </button>
</div>

  });

  async function unlock() {
    const pw = document.getElementById('pw').value;
    if (!pw) { showErr('Por favor, insira a senha.'); return; }

    const btn = document.getElementById('btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Verificando…';

    try {
      const salt = b64ToBytes(SALT);
      const iv   = b64ToBytes(IV);
      const ct   = b64ToBytes(CT);

      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']
      );

      let decrypted;
      try {
        decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      } catch {
        const inp = document.getElementById('pw');
        inp.classList.add('err');
        setTimeout(() => inp.classList.remove('err'), 400);
        inp.value = '';
        showErr('Senha incorreta. Tente novamente.');
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Entrar';
        inp.focus();
        return;
      }

      const html = new TextDecoder().decode(decrypted);
      document.open();
      document.write(html);
      document.close();

    } catch(e) {
      showErr('Erro interno. Tente recarregar a página.');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Entrar';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  window.addEventListener('DOMContentLoaded', () => document.getElementById('pw').focus());
</script>
</body>
